services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: lounaspaikka-backend
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      DATABASE_PATH: /data/lunch.sqlite
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_ADMIN_SOURCE_REQUEST_BUDGET: ${OPENAI_ADMIN_SOURCE_REQUEST_BUDGET:-20}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-nano}
      OPENAI_REFRESH_REQUEST_BUDGET: ${OPENAI_REFRESH_REQUEST_BUDGET:-100}
      TZ: Europe/Helsinki
    volumes:
      - lunch_data:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped

  caddy:
    image: caddy:2.11-alpine
    restart: unless-stopped
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-http://localhost}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  caddy_data:
  lunch_data:
